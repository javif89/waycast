name: CI

on:
  push:
    branches: [master]
    paths: &rust-paths
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "migrations/**"
      - ".sqlx/**"
      - ".forgejo/workflows/ci.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths: *rust-paths

env:
  SQLX_OFFLINE: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            pkg-config \
            libexpat1-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@1.94.0

      - name: Cache cargo build
        uses: https://github.com/Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets --locked

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            pkg-config \
            libexpat1-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy

      - name: Cache cargo build
        uses: https://github.com/Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
