name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Only gate PRs that touch code, packaging, or CI. When none of these
    # change, the workflow doesn't run and no fragment is required.
    paths:
      - "src/**"
      - "modules/**"
      - "migrations/**"
      - ".forgejo/**"
      - "flake.nix"

jobs:
  require-fragment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changelog fragment
        run: |
          set -euo pipefail
          BASE="${GITHUB_BASE_REF}"
          git fetch --no-tags origin "$BASE"

          # A gated path changed (guaranteed by the trigger `paths` filter) ->
          # require a fragment (added/modified, not deleted).
          FRAGMENTS=$(git diff --name-only --diff-filter=d "origin/$BASE...HEAD" \
            -- '.changes/unreleased/' \
            | { grep -E '\.ya?ml$' || true; } \
            | { grep -v '/\.gitkeep$' || true; })

          if [ -z "$FRAGMENTS" ]; then
            echo "::error::This PR changes code/packaging but adds no changelog fragment."
            echo "Add a fragment in the devenv shell with:  changie new"
            exit 1
          fi

          echo "Found changelog fragment(s):"
          echo "$FRAGMENTS"
