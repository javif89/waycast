name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  require-fragment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changelog fragment for code/packaging changes
        run: |
          set -euo pipefail
          BASE="${GITHUB_BASE_REF}"
          git fetch --no-tags origin "$BASE"

          CHANGED=$(git diff --name-only "origin/$BASE...HEAD")

          # Only gate PRs that touch code, packaging, or CI.
          GATED=$(echo "$CHANGED" | { grep -E '^(src|modules|migrations|\.forgejo)/|^flake\.nix$' || true; })
          if [ -z "$GATED" ]; then
            echo "No changes under src/, modules/, migrations/, .forgejo/, or flake.nix."
            echo "Changelog fragment not required for this PR."
            exit 0
          fi

          # A gated path changed -> require a fragment (added/modified, not deleted).
          FRAGMENTS=$(git diff --name-only --diff-filter=d "origin/$BASE...HEAD" \
            -- '.changes/unreleased/' \
            | { grep -E '\.ya?ml$' || true; } \
            | { grep -v '/\.gitkeep$' || true; })

          if [ -z "$FRAGMENTS" ]; then
            echo "::error::This PR changes code/packaging but adds no changelog fragment."
            echo "Gated changes:"
            echo "$GATED"
            echo "Add a fragment in the devenv shell with:  changie new"
            exit 1
          fi

          echo "Found changelog fragment(s):"
          echo "$FRAGMENTS"
