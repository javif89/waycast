# release.toml
workspace = true
allow_dirty = false
allow_untracked = false

# Do NOT auto-publish individual crates unless you actually want that.
# Most app workspaces just tag and release artifacts.
publish = false

# Version bump style
# patch | minor | major | alpha | beta | rc
level = "patch"

# Update all Cargo.toml files in the workspace
update_workspace = true

# Tag pattern (if you want per-crate tags, remove tag-prefix)
tag = true
tag-prefix = ""
tag-name = "{{version}}"

# Commit message template
pre-release-commit-message = "chore(release): release {{version}}"

# Run cargo-dist to build release artifacts AFTER tagging
post-release-hook = ["cargo", "dist", "build", "--no-confirm"]
